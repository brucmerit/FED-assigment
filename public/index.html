<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyTravelExpenses - Track Your Trips</title>
  <script defer src="script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Hero -->
  <section class="bg-cover bg-center bg-no-repeat text-white h-screen" style="background-image: url('travel.jpeg');">
  <div class="bg-amber-500 bg-opacity-60 py-20 px-6 text-center h-full flex flex-col items-center justify-center">
    <h2 class="text-4xl sm:text-5xl font-bold mb-4">Track Every Trip, Every Dollar, Every Adventure</h2>
    <p class="text-lg mb-6">Log your travel expenses and see exactly where your money goes!</p>
    <a href="#expenses" class="bg-blue-600 text-white hover:bg-blue-700 font-semibold py-2 px-4 rounded">View Expenses</a>
  </div>
  </section>

  <!-- Add Expense Form -->
  <section class="max-w-7xl mx-auto py-10 px-4">
    <h3 class="text-2xl font-bold mb-6">Log a New Expense</h3>
    <form id="expenseForm" class="bg-white rounded shadow p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
      <input type="hidden" id="editId" value="" />

      <div class="sm:col-span-2">
        <label class="block text-sm font-medium mb-1">Title</label>
        <input type="text" id="title" required placeholder="e.g. Flight to China"
          class="w-full border border-gray-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Category</label>
        <select id="category" class="w-full border border-gray-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option>Transport</option>
          <option>Lodging</option>
          <option>Food</option>
          <option>Activities</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Amount</label>
        <input type="number" id="amount" step="1" min="0" required placeholder="0.00"
          class="w-full border border-gray-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Date</label>
        <input type="date" id="date"
          class="w-full border border-gray-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div class="sm:col-span-2 flex items-center gap-3">
        <button type="submit" id="submitBtn"
          class="bg-blue-600 text-white hover:bg-blue-700 font-semibold py-2 px-4 rounded">
          Add Expense
        </button>
        <button type="button" id="cancelEditBtn"
          class="hidden bg-gray-200 hover:bg-gray-300 font-semibold py-2 px-4 rounded">
          Cancel Edit
        </button>
      </div>
    </form>
  </section>

  <!-- Expenses -->
  <section id="expenses" class="max-w-7xl mx-auto py-10 px-4">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-2xl font-bold">Your Expenses</h3>
      <p class="text-lg font-semibold">Total: <span id="totalAmount" class="text-blue-600">$0.00</span></p>
    </div>
    <div id="expenseContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <!-- Expense Cards -->
    </div>
    <p id="emptyMessage" class="hidden text-gray-500 mt-4">No expenses yet. Add your first one above.</p>
  </section>

</body>
</html>
